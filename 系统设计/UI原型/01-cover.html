<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薄荷市集 - 封面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    body { 
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(34, 197, 94, 0.3);
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15);
    }
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .pulse-leaf {
      animation: pulseLeaf 2s ease-in-out infinite;
    }
    @keyframes pulseLeaf {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(5deg); }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-8">
  
  <div class="max-w-4xl w-full">
    <!-- Main Card -->
    <div class="glass-card rounded-3xl p-12 text-center">
      
      <!-- Logo -->
      <div class="inline-flex items-center gap-4 mb-8">
        <div class="w-20 h-20 bg-gradient-to-br from-green-400 to-emerald-500 rounded-2xl flex items-center justify-center shadow-xl float-animation">
          <i class="fas fa-leaf text-4xl text-white"></i>
        </div>
        <div class="text-left">
          <h1 class="text-5xl font-bold text-green-800">薄荷市集</h1>
          <p class="text-green-600 text-xl">Bohemarket</p>
        </div>
      </div>

      <!-- Title -->
      <h2 class="text-4xl font-bold text-green-700 mb-4">店铺管理系统</h2>
      <p class="text-green-600 text-xl mb-8">Shop Management System</p>

      <!-- Divider -->
      <div class="flex items-center justify-center gap-4 mb-8">
        <div class="h-px w-20 bg-green-300"></div>
        <i class="fas fa-seedling text-green-400 text-xl"></i>
        <div class="h-px w-20 bg-green-300"></div>
      </div>

      <!-- Description -->
      <p class="text-green-700 text-lg mb-10 max-w-2xl mx-auto leading-relaxed">
        为您提供专业的饰品店铺管理解决方案，涵盖商品管理、库存管理、销售管理、会员管理等核心功能，助力店铺高效运营。
      </p>

      <!-- Features -->
      <div class="grid grid-cols-3 gap-6 mb-10">
        <div class="bg-green-50 rounded-xl p-4">
          <i class="fas fa-gem text-3xl text-green-600 mb-2"></i>
          <p class="text-green-800 font-semibold">商品管理</p>
          <p class="text-green-500 text-sm">P0 核心</p>
        </div>
        <div class="bg-green-50 rounded-xl p-4">
          <i class="fas fa-boxes-stacked text-3xl text-emerald-600 mb-2"></i>
          <p class="text-green-800 font-semibold">库存管理</p>
          <p class="text-green-500 text-sm">P0 核心</p>
        </div>
        <div class="bg-green-50 rounded-xl p-4">
          <i class="fas fa-chart-line text-3xl text-teal-600 mb-2"></i>
          <p class="text-green-800 font-semibold">销售管理</p>
          <p class="text-green-500 text-sm">P0 核心</p>
        </div>
      </div>

      <!-- Tech Stack -->
      <div class="flex justify-center gap-8 text-green-600">
        <div class="text-center">
          <i class="fab fa-react text-3xl text-cyan-600 mb-2"></i>
          <p class="text-sm">React</p>
        </div>
        <div class="text-center">
          <i class="fab fa-node-js text-3xl text-green-600 mb-2"></i>
          <p class="text-sm">Node.js</p>
        </div>
        <div class="text-center">
          <i class="fas fa-database text-3xl text-teal-600 mb-2"></i>
          <p class="text-sm">SQLite</p>
        </div>
        <div class="text-center">
          <i class="fab fa-css3-alt text-3xl text-blue-500 mb-2"></i>
          <p class="text-sm">Tailwind</p>
        </div>
      </div>

      <!-- Bottom -->
      <div class="mt-10 text-green-500">
        <p class="text-sm">清新自然 · 简洁高效</p>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-8">
      <a href="index.html" class="flex items-center gap-2 text-green-600 hover:text-green-800 transition">
        <i class="fas fa-arrow-left"></i>
        <span>返回导航</span>
      </a>
      <a href="02-overview.html" class="flex items-center gap-2 bg-green-500 text-white px-6 py-3 rounded-xl hover:bg-green-600 transition shadow-lg">
        <span>下一页</span>
        <i class="fas fa-arrow-right"></i>
      </a>
    </div>
  </div>

</body>
</html>
