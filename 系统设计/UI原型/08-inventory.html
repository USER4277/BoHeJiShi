<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薄荷市集 - 库存管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    body { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%); min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(34, 197, 94, 0.3); box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15); }
  </style>
</head>
<body class="p-8">
  <div class="max-w-6xl mx-auto">
    <h2 class="text-2xl font-bold text-green-800 mb-6">库存管理</h2>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="glass-card rounded-xl p-4 text-center">
        <i class="fas fa-box text-2xl text-blue-500 mb-2"></i>
        <p class="text-2xl font-bold text-green-800">2,456</p>
        <p class="text-green-500 text-sm">总SKU数</p>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <i class="fas fa-exclamation-triangle text-2xl text-orange-500 mb-2"></i>
        <p class="text-2xl font-bold text-green-800">23</p>
        <p class="text-green-500 text-sm">库存预警</p>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <i class="fas fa-arrow-down text-2xl text-red-500 mb-2"></i>
        <p class="text-2xl font-bold text-green-800">8</p>
        <p class="text-green-500 text-sm">缺货商品</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="glass-card rounded-xl p-4 mb-6">
      <div class="flex justify-between items-center">
        <h4 class="text-green-800 font-bold">库存预警列表</h4>
        <div class="flex gap-2">
          <button class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600"><i class="fas fa-arrow-down mr-1"></i>入库</button>
          <button class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600"><i class="fas fa-arrow-up mr-1"></i>出库</button>
          <button class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600"><i class="fas fa-clipboard-list mr-1"></i>盘点</button>
        </div>
      </div>
    </div>

    <!-- Warning List -->
    <div class="glass-card rounded-xl p-6 space-y-3">
      <div class="flex items-center justify-between bg-orange-50 rounded-xl p-4">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center"><i class="fas fa-gem text-orange-500 text-xl"></i></div>
          <div>
            <p class="text-green-800 font-semibold">金色耳钉套装</p>
            <p class="text-green-500 text-sm">SKU: SKU003 | 编码: PRD003</p>
          </div>
        </div>
        <div class="text-right mr-4">
          <p class="text-orange-500 font-bold">5件 ⚠️</p>
          <p class="text-green-500 text-xs">安全库存: 10</p>
        </div>
        <button class="bg-orange-500 text-white px-4 py-2 rounded-lg">立即采购</button>
      </div>
      <div class="flex items-center justify-between bg-red-50 rounded-xl p-4">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center"><i class="fas fa-ring text-red-500 text-xl"></i></div>
          <div>
            <p class="text-green-800 font-semibold">银质胸针-蝴蝶</p>
            <p class="text-green-500 text-sm">SKU: SKU008 | 编码: PRD008</p>
          </div>
        </div>
        <div class="text-right mr-4">
          <p class="text-red-500 font-bold">3件 ❌</p>
          <p class="text-green-500 text-xs">安全库存: 8</p>
        </div>
        <button class="bg-red-500 text-white px-4 py-2 rounded-lg">补货</button>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-10">
      <a href="index.html" class="flex items-center gap-2 text-green-600 hover:text-green-800"><i class="fas fa-arrow-left"></i><span>返回导航</span></a>
      <div class="flex gap-4">
        <a href="07-pos.html" class="text-green-600 hover:text-green-800">上一页</a>
        <span class="text-green-400">|</span>
        <a href="09-members.html" class="bg-green-500 text-white px-6 py-2 rounded-xl hover:bg-green-600">下一页</a>
      </div>
    </div>
  </div>
</body>
</html>
