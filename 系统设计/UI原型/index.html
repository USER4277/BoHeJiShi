<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薄荷市集店铺管理系统 - UI原型导航</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    body { 
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(34, 197, 94, 0.2);
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.1);
    }
    .module-card {
      transition: all 0.3s ease;
    }
    .module-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(34, 197, 94, 0.2);
    }
    .leaf-bg {
      position: fixed;
      opacity: 0.1;
      pointer-events: none;
    }
    .leaf-1 { top: 10%; left: 5%; transform: rotate(-15deg); }
    .leaf-2 { top: 60%; right: 10%; transform: rotate(25deg); }
    .leaf-3 { bottom: 15%; left: 15%; transform: rotate(10deg); }
  </style>
</head>
<body class="p-8">
  <!-- Decorative Leaves -->
  <i class="fas fa-leaf leaf-bg leaf-1 text-8xl text-green-600"></i>
  <i class="fas fa-leaf leaf-bg leaf-2 text-7xl text-green-500"></i>
  <i class="fas fa-seedling leaf-bg leaf-3 text-6xl text-green-400"></i>

  <div class="max-w-6xl mx-auto relative z-10">
    <!-- Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-16 h-16 bg-gradient-to-br from-green-400 to-emerald-500 rounded-2xl flex items-center justify-center shadow-lg">
          <i class="fas fa-leaf text-3xl text-white"></i>
        </div>
        <div class="text-left">
          <h1 class="text-4xl font-bold text-green-800">薄荷市集</h1>
          <p class="text-green-600">店铺管理系统</p>
        </div>
      </div>
      <h2 class="text-2xl font-medium text-green-700 mb-2">UI原型展示</h2>
      <p class="text-green-600">清新自然 · 简洁高效 · 专业可靠</p>
    </div>

    <!-- Page Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      
      <!-- Cover -->
      <a href="01-cover.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-green-100 to-emerald-200 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-home text-6xl text-green-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">01 封面</h3>
        <p class="text-green-600 text-sm">系统介绍封面</p>
      </a>

      <!-- Overview -->
      <a href="02-overview.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-emerald-100 to-teal-200 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-info-circle text-6xl text-emerald-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">02 系统概述</h3>
        <p class="text-green-600 text-sm">功能模块总览</p>
      </a>

      <!-- Modules -->
      <a href="03-modules.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-teal-100 to-cyan-200 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-th-large text-6xl text-teal-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">03 模块架构</h3>
        <p class="text-green-600 text-sm">功能模块分布</p>
      </a>

      <!-- Login -->
      <a href="04-login.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-lime-100 to-green-200 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-sign-in-alt text-6xl text-lime-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">04 登录页面</h3>
        <p class="text-green-600 text-sm">用户登录入口</p>
      </a>

      <!-- Dashboard -->
      <a href="05-dashboard.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-green-200 to-emerald-300 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-chart-pie text-6xl text-green-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">05 经营大屏</h3>
        <p class="text-green-600 text-sm">核心数据看板</p>
      </a>

      <!-- Products -->
      <a href="06-products.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-emerald-200 to-green-300 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-gem text-6xl text-emerald-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">06 商品管理</h3>
        <p class="text-green-600 text-sm">商品档案与分类</p>
      </a>

      <!-- POS -->
      <a href="07-pos.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-teal-200 to-cyan-300 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-cash-register text-6xl text-teal-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">07 POS收银</h3>
        <p class="text-green-600 text-sm">收银台界面</p>
      </a>

      <!-- Inventory -->
      <a href="08-inventory.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-cyan-200 to-blue-300 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-boxes-stacked text-6xl text-cyan-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">08 库存管理</h3>
        <p class="text-green-600 text-sm">出入库与预警</p>
      </a>

      <!-- Members -->
      <a href="09-members.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-violet-100 to-purple-200 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-users text-6xl text-violet-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">09 会员管理</h3>
        <p class="text-green-600 text-sm">会员档案与等级</p>
      </a>

      <!-- Promotion -->
      <a href="10-promotion.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-pink-100 to-rose-200 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-bullhorn text-6xl text-pink-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">10 营销管理</h3>
        <p class="text-green-600 text-sm">促销与优惠券</p>
      </a>

      <!-- Report -->
      <a href="11-report.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-amber-100 to-orange-200 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-file-invoice-dollar text-6xl text-amber-600"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">11 财务报表</h3>
        <p class="text-green-600 text-sm">日结与销售报表</p>
      </a>

      <!-- Summary -->
      <a href="12-summary.html" class="module-card glass-card rounded-2xl p-6 block">
        <div class="w-full h-40 bg-gradient-to-br from-green-300 to-emerald-400 rounded-xl mb-4 flex items-center justify-center">
          <i class="fas fa-check-circle text-6xl text-white"></i>
        </div>
        <h3 class="text-xl font-bold text-green-800 mb-1">12 总结页</h3>
        <p class="text-green-600 text-sm">原型展示完毕</p>
      </a>

    </div>

    <!-- Footer -->
    <div class="text-center mt-12 text-green-600">
      <p class="text-sm">薄荷市集 · 店铺管理系统 UI原型</p>
      <p class="text-xs mt-2 opacity-70">清新自然风格 · 简洁高效界面</p>
    </div>
  </div>
</body>
</html>
