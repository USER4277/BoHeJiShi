<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薄荷市集 - 会员管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    body { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%); min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(34, 197, 94, 0.3); box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15); }
  </style>
</head>
<body class="p-8">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <div>
        <h2 class="text-2xl font-bold text-green-800">会员管理</h2>
        <p class="text-green-600 text-sm">Member Management</p>
      </div>
      <button class="bg-gradient-to-r from-green-500 to-emerald-500 text-white px-6 py-3 rounded-xl font-semibold shadow-lg hover:shadow-xl transition">
        <i class="fas fa-user-plus mr-2"></i>新增会员
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="glass-card rounded-xl p-4">
        <p class="text-green-500 text-sm mb-1">会员总数</p>
        <p class="text-2xl font-bold text-green-800">1,256</p>
      </div>
      <div class="glass-card rounded-xl p-4">
        <p class="text-green-500 text-sm mb-1">本月新增</p>
        <p class="text-2xl font-bold text-green-600">+86</p>
      </div>
      <div class="glass-card rounded-xl p-4">
        <p class="text-green-500 text-sm mb-1">会员储值</p>
        <p class="text-2xl font-bold text-green-800">¥45,680</p>
      </div>
      <div class="glass-card rounded-xl p-4">
        <p class="text-green-500 text-sm mb-1">积分余额</p>
        <p class="text-2xl font-bold text-purple-600">128,560</p>
      </div>
    </div>

    <!-- Member List -->
    <div class="glass-card rounded-xl p-6">
      <h4 class="text-green-800 font-bold mb-4">会员列表</h4>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-green-50 rounded-xl p-4">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full flex items-center justify-center text-white font-bold text-xl">李</div>
            <div class="flex-1">
              <p class="text-green-800 font-semibold">李小姐</p>
              <p class="text-green-500 text-sm">138****8888</p>
            </div>
            <span class="px-2 py-1 bg-yellow-100 text-yellow-600 rounded-full text-xs">钻石</span>
          </div>
          <div class="flex justify-between text-sm text-green-600">
            <span>累计: ¥5,680</span>
            <span>积分: 5,680</span>
          </div>
        </div>
        <div class="bg-green-50 rounded-xl p-4">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 bg-gradient-to-br from-gray-400 to-gray-600 rounded-full flex items-center justify-center text-white font-bold text-xl">王</div>
            <div class="flex-1">
              <p class="text-green-800 font-semibold">王先生</p>
              <p class="text-green-500 text-sm">139****6666</p>
            </div>
            <span class="px-2 py-1 bg-orange-100 text-orange-600 rounded-full text-xs">金卡</span>
          </div>
          <div class="flex justify-between text-sm text-green-600">
            <span>累计: ¥2,150</span>
            <span>积分: 2,150</span>
          </div>
        </div>
        <div class="bg-green-50 rounded-xl p-4">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center text-white font-bold text-xl">张</div>
            <div class="flex-1">
              <p class="text-green-800 font-semibold">张女士</p>
              <p class="text-green-500 text-sm">137****5555</p>
            </div>
            <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded-full text-xs">普通</span>
          </div>
          <div class="flex justify-between text-sm text-green-600">
            <span>累计: ¥580</span>
            <span>积分: 580</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-10">
      <a href="index.html" class="flex items-center gap-2 text-green-600 hover:text-green-800"><i class="fas fa-arrow-left"></i><span>返回导航</span></a>
      <div class="flex gap-4">
        <a href="08-inventory.html" class="text-green-600 hover:text-green-800">上一页</a>
        <span class="text-green-400">|</span>
        <a href="10-promotion.html" class="bg-green-500 text-white px-6 py-2 rounded-xl hover:bg-green-600">下一页</a>
      </div>
    </div>
  </div>
</body>
</html>
