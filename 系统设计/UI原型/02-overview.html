<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薄荷市集 - 系统概述</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    body { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%); min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(34, 197, 94, 0.3); box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15); }
    .module-card { transition: all 0.3s ease; }
    .module-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(34, 197, 94, 0.2); }
  </style>
</head>
<body class="p-8">
  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-12 h-12 bg-gradient-to-br from-green-400 to-emerald-500 rounded-xl flex items-center justify-center">
          <i class="fas fa-leaf text-xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-green-800">薄荷市集</h1>
      </div>
      <h2 class="text-2xl font-bold text-green-700 mb-2">系统概述</h2>
      <p class="text-green-600">System Overview - 功能模块总览</p>
    </div>

    <!-- Images -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&h=300&fit=crop" alt="Dashboard" class="rounded-2xl shadow-lg w-full h-48 object-cover">
      <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&h=300&fit=crop" alt="Analytics" class="rounded-2xl shadow-lg w-full h-48 object-cover">
    </div>

    <!-- Core Modules -->
    <h3 class="text-xl font-bold text-green-700 mb-4">核心功能模块</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="module-card glass-card rounded-xl p-4 text-center">
        <i class="fas fa-gem text-3xl text-blue-500 mb-2"></i>
        <p class="text-green-800 font-semibold">商品管理</p>
        <span class="text-xs px-2 py-1 bg-red-100 text-red-600 rounded-full">P0 核心</span>
      </div>
      <div class="module-card glass-card rounded-xl p-4 text-center">
        <i class="fas fa-boxes-stacked text-3xl text-emerald-500 mb-2"></i>
        <p class="text-green-800 font-semibold">库存管理</p>
        <span class="text-xs px-2 py-1 bg-red-100 text-red-600 rounded-full">P0 核心</span>
      </div>
      <div class="module-card glass-card rounded-xl p-4 text-center">
        <i class="fas fa-chart-line text-3xl text-teal-500 mb-2"></i>
        <p class="text-green-800 font-semibold">销售管理</p>
        <span class="text-xs px-2 py-1 bg-red-100 text-red-600 rounded-full">P0 核心</span>
      </div>
      <div class="module-card glass-card rounded-xl p-4 text-center">
        <i class="fas fa-users text-3xl text-purple-500 mb-2"></i>
        <p class="text-green-800 font-semibold">会员管理</p>
        <span class="text-xs px-2 py-1 bg-orange-100 text-orange-600 rounded-full">P1 重要</span>
      </div>
    </div>

    <!-- Secondary Modules -->
    <h3 class="text-xl font-bold text-green-700 mb-4">扩展功能模块</h3>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
      <div class="module-card glass-card rounded-xl p-3 text-center">
        <i class="fas fa-bullhorn text-2xl text-pink-500 mb-1"></i>
        <p class="text-green-800 font-medium text-sm">营销管理</p>
        <span class="text-xs text-green-500">P1</span>
      </div>
      <div class="module-card glass-card rounded-xl p-3 text-center">
        <i class="fas fa-file-invoice-dollar text-2xl text-amber-500 mb-1"></i>
        <p class="text-green-800 font-medium text-sm">财务报表</p>
        <span class="text-xs text-green-500">P1</span>
      </div>
      <div class="module-card glass-card rounded-xl p-3 text-center">
        <i class="fas fa-chart-pie text-2xl text-indigo-500 mb-1"></i>
        <p class="text-green-800 font-medium text-sm">数据分析</p>
        <span class="text-xs text-green-500">P1</span>
      </div>
      <div class="module-card glass-card rounded-xl p-3 text-center">
        <i class="fas fa-cog text-2xl text-gray-500 mb-1"></i>
        <p class="text-green-800 font-medium text-sm">系统设置</p>
        <span class="text-xs text-green-500">P0</span>
      </div>
      <div class="module-card glass-card rounded-xl p-3 text-center">
        <i class="fas fa-shopping-bag text-2xl text-cyan-500 mb-1"></i>
        <p class="text-green-800 font-medium text-sm">采购管理</p>
        <span class="text-xs text-green-500">P2</span>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-10">
      <a href="index.html" class="flex items-center gap-2 text-green-600 hover:text-green-800 transition">
        <i class="fas fa-arrow-left"></i><span>返回导航</span>
      </a>
      <div class="flex gap-4">
        <a href="01-cover.html" class="text-green-600 hover:text-green-800">上一页</a>
        <span class="text-green-400">|</span>
        <a href="03-modules.html" class="bg-green-500 text-white px-6 py-2 rounded-xl hover:bg-green-600 transition">下一页</a>
      </div>
    </div>
  </div>
</body>
</html>
