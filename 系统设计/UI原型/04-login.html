<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薄荷市集 - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    body { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%); min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(34, 197, 94, 0.3); box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15); }
    .input-field { background: white; border: 2px solid #e5e7eb; transition: all 0.3s ease; }
    .input-field:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1); }
    .btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); transition: all 0.3s ease; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-8">
  <div class="max-w-md w-full">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3">
        <div class="w-16 h-16 bg-gradient-to-br from-green-400 to-emerald-500 rounded-2xl flex items-center justify-center shadow-lg">
          <i class="fas fa-leaf text-3xl text-white"></i>
        </div>
        <div class="text-left">
          <h1 class="text-3xl font-bold text-green-800">薄荷市集</h1>
          <p class="text-green-600">店铺管理系统</p>
        </div>
      </div>
    </div>

    <!-- Login Card -->
    <div class="glass-card rounded-3xl p-8">
      <h2 class="text-2xl font-bold text-green-800 text-center mb-6">用户登录</h2>
      
      <div class="space-y-5">
        <!-- Username -->
        <div>
          <label class="block text-green-700 font-medium mb-2">用户名</label>
          <div class="relative">
            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" value="admin" class="input-field w-full pl-12 pr-4 py-3 rounded-xl focus:outline-none" placeholder="请输入用户名">
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-green-700 font-medium mb-2">密码</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" value="admin123" class="input-field w-full pl-12 pr-4 py-3 rounded-xl focus:outline-none" placeholder="请输入密码">
          </div>
        </div>

        <!-- Remember & Forgot -->
        <div class="flex justify-between items-center text-sm">
          <label class="flex items-center gap-2 text-green-600 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-green-500 focus:ring-green-500">
            <span>记住我</span>
          </label>
          <a href="#" class="text-green-500 hover:text-green-700">忘记密码？</a>
        </div>

        <!-- Submit Button -->
        <button class="btn-primary w-full text-white font-bold py-4 rounded-xl shadow-lg">
          <i class="fas fa-sign-in-alt mr-2"></i>登录
        </button>
      </div>

      <!-- Default Account -->
      <div class="mt-6 text-center text-gray-500 text-sm bg-green-50 rounded-xl p-4">
        <p><i class="fas fa-info-circle text-green-500 mr-1"></i>默认账户: admin / admin123</p>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-8">
      <a href="index.html" class="flex items-center gap-2 text-green-600 hover:text-green-800 transition">
        <i class="fas fa-arrow-left"></i><span>返回导航</span>
      </a>
      <div class="flex gap-4">
        <a href="03-modules.html" class="text-green-600 hover:text-green-800">上一页</a>
        <span class="text-green-400">|</span>
        <a href="05-dashboard.html" class="bg-green-500 text-white px-6 py-2 rounded-xl hover:bg-green-600 transition">下一页</a>
      </div>
    </div>
  </div>
</body>
</html>
