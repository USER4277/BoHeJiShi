<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薄荷市集 - POS收银</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    body { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%); min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(34, 197, 94, 0.3); box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15); }
  </style>
</head>
<body class="p-8">
  <div class="max-w-6xl mx-auto">
    <h2 class="text-2xl font-bold text-green-800 mb-6">POS收银台</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Left: Product Search -->
      <div class="glass-card rounded-xl p-6">
        <h4 class="text-green-800 font-bold mb-4"><i class="fas fa-search text-green-500 mr-2"></i>商品搜索</h4>
        <div class="relative mb-4">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" placeholder="输入商品编码或名称..." class="w-full bg-white border-2 border-gray-200 rounded-xl py-3 pl-12 pr-4 focus:border-green-400 focus:outline-none">
        </div>
        <div class="flex flex-wrap gap-2 mb-4">
          <button class="px-3 py-1 bg-blue-100 text-blue-600 rounded-lg text-sm hover:bg-blue-200">戒指</button>
          <button class="px-3 py-1 bg-purple-100 text-purple-600 rounded-lg text-sm hover:bg-purple-200">项链</button>
          <button class="px-3 py-1 bg-pink-100 text-pink-600 rounded-lg text-sm hover:bg-pink-200">耳饰</button>
          <button class="px-3 py-1 bg-green-100 text-green-600 rounded-lg text-sm hover:bg-green-200">手链</button>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <div class="bg-green-50 rounded-lg p-3 text-center cursor-pointer hover:bg-green-100 transition">
            <p class="text-green-800 font-medium text-sm">纯银戒指</p>
            <p class="text-green-500 text-xs">¥299</p>
          </div>
          <div class="bg-green-50 rounded-lg p-3 text-center cursor-pointer hover:bg-green-100 transition">
            <p class="text-green-800 font-medium text-sm">珍珠项链</p>
            <p class="text-green-500 text-xs">¥199</p>
          </div>
          <div class="bg-green-50 rounded-lg p-3 text-center cursor-pointer hover:bg-green-100 transition">
            <p class="text-green-800 font-medium text-sm">金色耳钉</p>
            <p class="text-green-500 text-xs">¥89</p>
          </div>
        </div>
      </div>

      <!-- Right: Current Order -->
      <div class="glass-card rounded-xl p-6">
        <h4 class="text-green-800 font-bold mb-4"><i class="fas fa-shopping-cart text-green-500 mr-2"></i>当前订单</h4>
        <div class="space-y-2 mb-4 max-h-40 overflow-y-auto">
          <div class="flex justify-between items-center bg-green-50 rounded-lg p-3">
            <div>
              <p class="text-green-800 font-medium text-sm">纯银开口戒指</p>
              <p class="text-green-500 text-xs">¥299 × 1</p>
            </div>
            <span class="text-green-800 font-bold">¥299</span>
          </div>
          <div class="flex justify-between items-center bg-green-50 rounded-lg p-3">
            <div>
              <p class="text-green-800 font-medium text-sm">珍珠锁骨链</p>
              <p class="text-green-500 text-xs">¥199 × 1</p>
            </div>
            <span class="text-green-800 font-bold">¥199</span>
          </div>
        </div>
        <div class="border-t border-green-200 pt-3 space-y-2">
          <div class="flex justify-between text-green-600"><span>合计</span><span class="font-medium">¥498</span></div>
          <div class="flex justify-between text-green-600"><span>折扣</span><span class="text-green-400">-¥0</span></div>
          <div class="flex justify-between text-xl font-bold text-green-800"><span>应付</span><span class="text-green-500">¥498</span></div>
        </div>
        <div class="flex gap-2 mt-4">
          <button class="flex-1 bg-gray-100 text-green-700 py-2 rounded-lg hover:bg-gray-200 text-sm"><i class="fas fa-pause mr-1"></i>挂单</button>
          <button class="flex-1 bg-gray-100 text-green-700 py-2 rounded-lg hover:bg-gray-200 text-sm"><i class="fas fa-id-card mr-1"></i>会员</button>
          <button class="flex-1 bg-gray-100 text-green-700 py-2 rounded-lg hover:bg-gray-200 text-sm"><i class="fas fa-ticket mr-1"></i>优惠</button>
        </div>
        <button class="w-full mt-4 bg-gradient-to-r from-green-500 to-emerald-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition">
          <i class="fas fa-credit-card mr-2"></i>收款 ¥498
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-10">
      <a href="index.html" class="flex items-center gap-2 text-green-600 hover:text-green-800"><i class="fas fa-arrow-left"></i><span>返回导航</span></a>
      <div class="flex gap-4">
        <a href="06-products.html" class="text-green-600 hover:text-green-800">上一页</a>
        <span class="text-green-400">|</span>
        <a href="08-inventory.html" class="bg-green-500 text-white px-6 py-2 rounded-xl hover:bg-green-600">下一页</a>
      </div>
    </div>
  </div>
</body>
</html>
