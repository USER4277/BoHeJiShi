<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薄荷市集 - 商品管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    body { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%); min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(34, 197, 94, 0.3); box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15); }
  </style>
</head>
<body class="p-8">
  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <div>
        <h2 class="text-2xl font-bold text-green-800">商品管理</h2>
        <p class="text-green-600 text-sm">Product Management</p>
      </div>
      <button class="bg-gradient-to-r from-green-500 to-emerald-500 text-white px-6 py-3 rounded-xl font-semibold shadow-lg hover:shadow-xl transition">
        <i class="fas fa-plus mr-2"></i>新增商品
      </button>
    </div>

    <!-- Filters -->
    <div class="glass-card rounded-xl p-4 mb-6">
      <div class="flex flex-wrap gap-4">
        <input type="text" placeholder="搜索商品..." class="flex-1 min-w-[200px] bg-white border-2 border-gray-200 rounded-xl px-4 py-2 focus:border-green-400 focus:outline-none">
        <select class="bg-white border-2 border-gray-200 rounded-xl px-4 py-2 focus:border-green-400 focus:outline-none">
          <option>全部分类</option>
          <option>戒指</option>
          <option>项链</option>
          <option>耳饰</option>
          <option>手链</option>
        </select>
        <select class="bg-white border-2 border-gray-200 rounded-xl px-4 py-2 focus:border-green-400 focus:outline-none">
          <option>全部状态</option>
          <option>上架</option>
          <option>下架</option>
        </select>
      </div>
    </div>

    <!-- Table -->
    <div class="glass-card rounded-xl overflow-hidden">
      <table class="w-full">
        <thead class="bg-green-50">
          <tr class="text-green-700 text-sm">
            <th class="py-3 px-4 text-left">编码</th>
            <th class="py-3 px-4 text-left">商品名称</th>
            <th class="py-3 px-4 text-left">分类</th>
            <th class="py-3 px-4 text-left">品牌</th>
            <th class="py-3 px-4 text-right">吊牌价</th>
            <th class="py-3 px-4 text-right">库存</th>
            <th class="py-3 px-4 text-center">状态</th>
            <th class="py-3 px-4 text-center">操作</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-green-100">
          <tr class="hover:bg-green-50 transition">
            <td class="py-3 px-4 text-green-600">PRD001</td>
            <td class="py-3 px-4 text-green-800 font-medium">纯银开口戒指</td>
            <td class="py-3 px-4"><span class="px-2 py-1 bg-blue-100 text-blue-600 rounded-full text-xs">戒指</span></td>
            <td class="py-3 px-4 text-gray-600">薄荷精选</td>
            <td class="py-3 px-4 text-right text-green-800 font-bold">¥299</td>
            <td class="py-3 px-4 text-right text-green-600">156</td>
            <td class="py-3 px-4 text-center"><span class="px-2 py-1 bg-green-100 text-green-600 rounded-full text-xs">上架</span></td>
            <td class="py-3 px-4 text-center">
              <button class="text-blue-500 hover:text-blue-700 mr-3"><i class="fas fa-edit"></i></button>
              <button class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
          <tr class="hover:bg-green-50 transition">
            <td class="py-3 px-4 text-green-600">PRD002</td>
            <td class="py-3 px-4 text-green-800 font-medium">珍珠锁骨链</td>
            <td class="py-3 px-4"><span class="px-2 py-1 bg-purple-100 text-purple-600 rounded-full text-xs">项链</span></td>
            <td class="py-3 px-4 text-gray-600">薄荷精选</td>
            <td class="py-3 px-4 text-right text-green-800 font-bold">¥199</td>
            <td class="py-3 px-4 text-right text-green-600">89</td>
            <td class="py-3 px-4 text-center"><span class="px-2 py-1 bg-green-100 text-green-600 rounded-full text-xs">上架</span></td>
            <td class="py-3 px-4 text-center">
              <button class="text-blue-500 hover:text-blue-700 mr-3"><i class="fas fa-edit"></i></button>
              <button class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
          <tr class="hover:bg-green-50 transition">
            <td class="py-3 px-4 text-green-600">PRD003</td>
            <td class="py-3 px-4 text-green-800 font-medium">金色耳钉套装</td>
            <td class="py-3 px-4"><span class="px-2 py-1 bg-pink-100 text-pink-600 rounded-full text-xs">耳饰</span></td>
            <td class="py-3 px-4 text-gray-600">轻奢品牌</td>
            <td class="py-3 px-4 text-right text-green-800 font-bold">¥159</td>
            <td class="py-3 px-4 text-right text-orange-500">5 ⚠️</td>
            <td class="py-3 px-4 text-center"><span class="px-2 py-1 bg-red-100 text-red-600 rounded-full text-xs">下架</span></td>
            <td class="py-3 px-4 text-center">
              <button class="text-blue-500 hover:text-blue-700 mr-3"><i class="fas fa-edit"></i></button>
              <button class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="flex justify-between items-center p-4 bg-green-50 text-green-600 text-sm">
        <span>共 156 条记录</span>
        <div class="flex gap-1">
          <button class="px-3 py-1 bg-white rounded hover:bg-green-100">上一页</button>
          <button class="px-3 py-1 bg-green-500 text-white rounded">1</button>
          <button class="px-3 py-1 bg-white rounded hover:bg-green-100">2</button>
          <button class="px-3 py-1 bg-white rounded hover:bg-green-100">3</button>
          <button class="px-3 py-1 bg-white rounded hover:bg-green-100">下一页</button>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-between items-center mt-10">
      <a href="index.html" class="flex items-center gap-2 text-green-600 hover:text-green-800"><i class="fas fa-arrow-left"></i><span>返回导航</span></a>
      <div class="flex gap-4">
        <a href="05-dashboard.html" class="text-green-600 hover:text-green-800">上一页</a>
        <span class="text-green-400">|</span>
        <a href="07-pos.html" class="bg-green-500 text-white px-6 py-2 rounded-xl hover:bg-green-600">下一页</a>
      </div>
    </div>
  </div>
</body>
</html>
